spring:
  profiles:
    default: local
  datasource:
    username: root
    password: root

  application:
    name: crawler
  rabbitmq:
    host: localhost
    username: ${rabbitMQ_username:guest}
    password: ${rabbitMQ_password:guest}
    port: 5672
    listener:
      simple:
        prefetch: 1

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: prometheus, health
  metrics:
    tags:
      application: ${spring.application.name}
---

batch:
  cron:
    crawl: "0 */1 * * * *"

spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:mysql://localhost:3306/quick_stack
  jpa:
    hibernate:
      ddl-auto: none

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:mysql://local-mysql:3306/quick_stack?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
  rabbitmq:
    host: local-rabbitmq
    username: ${rabbitMQ_username}
    password: ${rabbitMQ_password}
    port: 5672
    listener:
      simple:
        prefetch: 1
# application-prod.yml
batch:
  cron:
    crawl: "0 0 0/6 * * *"


